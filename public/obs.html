<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Overlay</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            min-width: 200px !important;
        }

        .usernamelink {
            color: rgb(102, 143, 217) !important;
        }

        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
        }

        .eventcontainer {
            height: 100vh !important;
            margin: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            background: transparent !important;
            overflow-y: hidden !important; /* Let the chat auto-scroll handle it */
            box-sizing: border-box;
        }

        .eventcontainer > div {
            margin-top: 5px;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.4.1/socket.io.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        window.settings = Object.fromEntries(new URLSearchParams(location.search));

        function applyDynamicOverlaySettings(settings) {
            if (!settings) return;
            window.settings = { ...window.settings, ...settings };
            
            // Remove old dynamic styles if they exist
            $('#dynamic-overlay-styles').remove();
            
            let styleCss = '';
            
            if (window.settings.fontColor) {
                styleCss += `body { color: ${window.settings.fontColor} !important; }\n`;
            }

            // Always hide profile pics in OBS and add text shadow for readability
            styleCss += `
                .miniprofilepicture { display: none !important; }
                .tiktok-message, .kick-message, .twitch-message, .chatcontainer div, .eventcontainer div, .kick-gifted-sub, .kick-gifted-sub-item {
                    text-shadow: 2px 2px 4px black, -2px -2px 4px black, 2px -2px 4px black, -2px 2px 4px black, 0px 0px 8px black !important;
                }
            `;

            if (window.settings.bgColor) {
                let boxShadow = window.settings.bgColor === 'transparent' ? 'none' : '';
                styleCss += `
                    .tiktok-message, .kick-message, .twitch-message, .chatcontainer div, .eventcontainer div, .kick-gifted-sub, .kick-gifted-sub-item { 
                        background: ${window.settings.bgColor} !important; 
                        ${boxShadow ? `box-shadow: ${boxShadow} !important; border: none !important;` : ''}
                    }
                    /* Restore left border for gifted subs if transparent */
                    .kick-gifted-sub, .kick-gifted-sub-item {
                        border-left: 4px solid #a855f7 !important;
                    }
                `;
                
                if (window.settings.animation) {
                    styleCss += `
                        .tiktok-message, .kick-message, .twitch-message, .chatcontainer div, .eventcontainer div, .kick-gifted-sub, .kick-gifted-sub-item {
                            animation: ${window.settings.animation} 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
                        }
                    `;
                }
            }
            styleCss += `body { background-color: transparent !important; }\n`;

            if (window.settings.fontSize) {
                styleCss += `body { font-size: ${window.settings.fontSize} !important; }\n`;
            }

            if (window.settings.fontFamily) {
                styleCss += `body { font-family: ${window.settings.fontFamily} !important; }\n`;
                // Load Google Font if needed
                const googleFonts = ['Roboto','Outfit','Poppins','Nunito','Montserrat','Oswald','Bebas Neue'];
                const fontName = window.settings.fontFamily.replace(/['"]/g, '').split(',')[0].trim();
                if (googleFonts.some(f => f.toLowerCase() === fontName.toLowerCase())) {
                    if (!$(`link[href*="${encodeURIComponent(fontName)}"]`).length) {
                        const link = document.createElement('link');
                        link.rel = 'stylesheet';
                        link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fontName)}:wght@400;700&display=swap`;
                        document.head.appendChild(link);
                    }
                }
            }

            if (window.settings.textShadow) {
                styleCss += `body, body * { text-shadow: ${window.settings.textShadow} !important; }\n`;
            } else {
                styleCss += `body, body * { text-shadow: 2px 2px 4px black, -2px -2px 4px black, 2px -2px 4px black, -2px 2px 4px black, 0px 0px 8px black !important; }\n`;
            }
            
            $('body').removeClass('hide-tiktok-likes hide-tiktok-follows hide-tiktok-joins');
            if (window.settings.showLikes === '0') $('body').addClass('hide-tiktok-likes');
            if (window.settings.showFollows === '0') $('body').addClass('hide-tiktok-follows');
            if (window.settings.showJoins === '0') $('body').addClass('hide-tiktok-joins');
            
            if (window.settings.showChats === '0') {
                styleCss += `.chat-msg, .kick-message, .twitch-message { display: none !important; }\n`;
            }

            const fw = window.settings.fontWeight || '700';
            styleCss += `body, body * { font-weight: ${fw} !important; }\n`;

            if (window.settings.fontWeight) {
                styleCss += `body { font-weight: ${window.settings.fontWeight} !important; }\n`;
            }

            $('<style>').attr('id', 'dynamic-overlay-styles').text(styleCss).appendTo('head');
        }

        window.addEventListener('load', () => {
            applyDynamicOverlaySettings(window.settings);
            
            // Wait a short moment to ensure window.connection is initialized by app.js
            setTimeout(() => {
                if (window.connection) {
                    window.connection.on('overlaySettingsUpdated', (settings) => {
                        applyDynamicOverlaySettings(settings);
                    });
                }
            }, 500);
        })
    </script>

    <script src="connection.js"></script>
    <script src="app.js"></script>
</head>

<body>

    <table class="splitstatetable" style="display: none;">
        <tr>
            <td>
                <pre id="stateText"></pre>
            </td>
            <td>
                <div id="roomStats"></div>
            </td>
        </tr>
    </table>

    <div class="eventcontainer">
    </div>
</body>

</html>
